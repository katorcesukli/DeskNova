<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeskNova | Admin Management</title>
    <style>
        /* Small style block to keep metrics readable */
        .metric-container { display: flex; gap: 40px; background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .metric-card { flex: 1; }
        #userModal { background: #fff; border: 1px solid #000; padding: 20px; position: fixed; top: 20%; left: 30%; width: 400px; }
    </style>
</head>
<body>

<h1>DeskNova Admin Dashboard</h1>

<fieldset>
    <legend>Helpdesk Metrics</legend>
    <div id="metricsContent" class="metric-container">
        <p>Loading metrics...</p>
    </div>
</fieldset>

<br>

<h3>User Management</h3>
<button type="button" onclick="openCreateModal()">Add New User</button>

<hr>

<table border="1" width="100%">
    <thead>
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Last Updated</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="userTableBody">
    </tbody>
</table>

<div id="userModal" style="display:none;">
    <h3 id="modalTitle">Add User</h3>
    <form id="userForm">
        <input type="hidden" id="isEditMode" value="false">
        <input type="hidden" id="originalEmail">

        <div>
            <label>First Name:</label><br>
            <input type="text" id="firstName" required>
        </div>
        <div>
            <label>Last Name:</label><br>
            <input type="text" id="lastName" required>
        </div>
        <div>
            <label>Email:</label><br>
            <input type="email" id="email" required>
        </div>
        <div>
            <label>Password:</label><br>
            <input type="password" id="password" placeholder="Leave blank to keep same">
        </div>
        <div>
            <label>Role:</label><br>
            <select id="role">
                <option value="CLIENT">CLIENT</option>
                <option value="AGENT">AGENT</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </div>
        <br>
        <button type="submit">Save User</button>
        <button type="button" onclick="document.getElementById('userModal').style.display='none'">Cancel</button>
    </form>
</div>

<script src="js/admin.js"></script>
</body>
</html>
