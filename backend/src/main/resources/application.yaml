spring:
  application:
    name: desk-nova

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    baseline-on-migrate: true

  #email properties
  mail:
    #host: smtp.office365.com
    host: smtp.gmail.com
    port: 587
    #587 2525
    username: desk.nova.info@gmail.com
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: "lK9zQw7h2VfYpR3uXn8aJt5mC4dHb0oGqTwZcN5vXyB8eFsUjLkM7r1nEy6vPa="
  expiration: 86400000

server:
  port: ${PORT:8080}
